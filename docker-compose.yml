services:
  mysql:
    image: mysql:5.7
    platform: linux/amd64
    container_name: nyzy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nyzy123456
      MYSQL_DATABASE: nyzy
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pnyzy123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: nyzy-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nyzy?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: nyzy123456
      NYZY_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build: ./frontend
    container_name: nyzy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8000:80"

volumes:
  mysql-data:
  uploads-data:
